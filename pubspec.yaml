name: debit_pro
description: 'DebtPro — debt and installment management app.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

  # State management & DI
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1

  # Functional / value types
  dartz: ^0.10.1
  equatable: ^2.0.7

  # Code-gen helpers (annotations only)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^17.2.3

  # Utils
  intl: ^0.20.2
  logger: ^2.6.2
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.1

  # App icon generation
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icon/icon.png'
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/Inter/
    - assets/fonts/Cairo/
    - assets/icon/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-variable.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-variable.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-variable.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-variable.ttf
          weight: 700